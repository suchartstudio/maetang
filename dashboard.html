<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองแม่แตง - Dashboard สถิติราคาทอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 2rem;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-title {
            color: #FF0000;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ส่วนการ์ดสรุปข้อมูลด้านบน */
        .summary-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid #FF0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .card-value {
            font-size: 42px;
            font-weight: 700;
            color: #000;
        }

        .card-value.positive {
            color: #00a650; /* สีเขียวสำหรับขึ้น */
        }

        .card-value.negative {
            color: #e53935; /* สีแดงสำหรับลง */
        }
        
        .card-value.neutral {
            color: #000; 
        }

        /* ส่วนกราฟและปุ่มควบคุม */
        .chart-section {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .toggle-buttons {
            display: flex;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .toggle-btn {
            padding: 10px 25px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #555;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: #FF0000;
            color: #FFFF00; /* แดง-เหลือง ตามธีมร้าน */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .canvas-container {
            position: relative;
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-title">
            📊 แดชบอร์ดสรุปราคาทองคำ (ทองคำแท่ง 96.5%)
        </div>

        <div class="summary-cards">
            <div class="card">
                <div class="card-title">ราคารับซื้อปัจจุบัน (บาท)</div>
                <div class="card-value" id="current-price">กำลังโหลด...</div>
            </div>
            <div class="card" style="border-left-color: #FFFF00;">
                <div class="card-title">การปรับราคาล่าสุด (บาท)</div>
                <div class="card-value" id="price-change">-</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-controls">
                <div class="chart-title" id="chart-heading">แนวโน้มราคาทองคำ (รายวัน)</div>
                <div class="toggle-buttons">
                    <button class="toggle-btn active" id="btn-daily" onclick="switchTab('daily')">รายวัน</button>
                    <button class="toggle-btn" id="btn-monthly" onclick="switchTab('monthly')">รายเดือน</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="goldChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ชุดข้อมูลสำหรับการแสดงผลกราฟ
        const dailyData = {
            labels: ['09:30', '11:00', '13:15', '14:30', '15:00', '16:15'],
            prices: [40400, 40450, 40450, 40500, 40450, 40550]
        };

        const monthlyData = {
            labels: ['1 มิ.ย.', '5 มิ.ย.', '10 มิ.ย.', '15 มิ.ย.', '20 มิ.ย.', '25 มิ.ย.', '30 มิ.ย.'],
            prices: [39800, 40100, 40050, 40300, 40200, 40450, 40550]
        };

        let goldChartInstance = null;
        let currentMode = 'daily';

        // ฟังก์ชันแปลงตัวเลขให้มีลูกน้ำ
        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        // ฟังก์ชันวาดกราฟ
        function renderChart(dataLabels, dataValues) {
            const ctx = document.getElementById('goldChart').getContext('2d');
            
            if (goldChartInstance) {
                goldChartInstance.destroy(); // ลบกราฟเก่าทิ้งก่อนวาดใหม่
            }

            goldChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataLabels,
                    datasets: [{
                        label: ' ราคารับซื้อ (บาท)',
                        data: dataValues,
                        borderColor: '#FF0000', // เส้นสีแดง
                        backgroundColor: 'rgba(255, 0, 0, 0.1)', // พื้นใต้กราฟสีแดงอ่อน
                        borderWidth: 3,
                        pointBackgroundColor: '#FFFF00', // จุดสีเหลือง
                        pointBorderColor: '#FF0000',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        fill: true,
                        tension: 0.3 // ความโค้งของเส้นกราฟ
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { family: 'Kanit', size: 14 },
                            bodyFont: { family: 'Kanit', size: 16, weight: 'bold' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `ราคา: ${formatNumber(context.raw)} บาท`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: Math.min(...dataValues) - 200, // ขอบเขตล่างของกราฟ
                            max: Math.max(...dataValues) + 200, // ขอบเขตบนของกราฟ
                            ticks: {
                                font: { family: 'Kanit', size: 14 },
                                callback: function(value) { return formatNumber(value); }
                            },
                            grid: { color: '#f0f0f0' }
                        },
                        x: {
                            ticks: { font: { family: 'Kanit', size: 14 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // ฟังก์ชันสลับแท็บ รายวัน/รายเดือน
        window.switchTab = function(mode) {
            currentMode = mode;
            
            // เปลี่ยนสีปุ่ม
            document.getElementById('btn-daily').classList.remove('active');
            document.getElementById('btn-monthly').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');

            // เปลี่ยนหัวข้อและวาดกราฟใหม่
            if (mode === 'daily') {
                document.getElementById('chart-heading').innerText = 'แนวโน้มราคาทองคำ (รายวัน)';
                renderChart(dailyData.labels, dailyData.prices);
            } else {
                document.getElementById('chart-heading').innerText = 'แนวโน้มราคาทองคำ (รายเดือน)';
                renderChart(monthlyData.labels, monthlyData.prices);
            }
        };

        // ฟังก์ชันดึงข้อมูลจาก API ของสมาคม (ชุดเดียวกับที่ใช้บนหน้าจอ)
        async function fetchDashboardData() {
            try {
                const response = await fetch('https://api.chnwt.dev/thai-gold-api/latest');
                const data = await response.json();
                
                if (data.status === "success") {
                    const currentBuyPrice = parseFloat(data.response.price.gold_bar.buy.replace(/,/g, ''));
                    
                    // อัปเดตการ์ด "ราคารับซื้อปัจจุบัน"
                    document.getElementById('current-price').innerText = formatNumber(currentBuyPrice);

                    // คำนวณผลต่าง (เปรียบเทียบกับราคาก่อนหน้าของวันนี้)
                    // หมายเหตุ: เนื่องจาก API นี้ส่งคืนราคาล่าสุดอย่างเดียว เพื่อให้แสดงผลลัพธ์ได้ 
                    // จึงนำมาเทียบกับราคาล่าสุดใน Array กราฟรายวันเป็นข้อมูลตั้งต้น
                    const previousPrice = dailyData.prices[dailyData.prices.length - 2]; 
                    const change = currentBuyPrice - previousPrice;
                    
                    const changeElement = document.getElementById('price-change');
                    if (change > 0) {
                        changeElement.innerText = `+${formatNumber(change)}`;
                        changeElement.className = 'card-value positive';
                    } else if (change < 0) {
                        changeElement.innerText = `${formatNumber(change)}`;
                        changeElement.className = 'card-value negative';
                    } else {
                        changeElement.innerText = `0`;
                        changeElement.className = 'card-value neutral';
                    }

                    // อัปเดตจุดสุดท้ายของกราฟรายวันให้เป็นราคา Real-time
                    dailyData.prices[dailyData.prices.length - 1] = currentBuyPrice;
                    if(currentMode === 'daily') {
                        renderChart(dailyData.labels, dailyData.prices);
                    }
                }
            } catch (error) {
                console.error("ดึงข้อมูลล้มเหลว:", error);
                document.getElementById('current-price').innerText = "ไม่สามารถเชื่อมต่อได้";
            }
        }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเสร็จ
        renderChart(dailyData.labels, dailyData.prices); // วาดกราฟตั้งต้น
        fetchDashboardData(); // ดึงราคาจริงมาทับ
        setInterval(fetchDashboardData, 60000); // อัปเดตข้อมูลทุก 1 นาที

    </script>
</body>
</html>
